name: Release Windows Build
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm install

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: transcrptr-v__VERSION__
          releaseName: 'Transcrptr v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          includeRelease: true

      - name: Extract Project Version
        run: |
          $VERSION = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          echo "APP_VERSION=$VERSION" >> $env:GITHUB_ENV

      - name: Copy Portable Executable
        run: |
          $exePath = "src-tauri/target/release/transcrptr.exe"
          if (Test-Path "src-tauri/target/x86_64-pc-windows-msvc/release/transcrptr.exe") {
            $exePath = "src-tauri/target/x86_64-pc-windows-msvc/release/transcrptr.exe"
          }
          if (Test-Path $exePath) {
            Copy-Item -Path $exePath -Destination "Transcrptr-portable.exe"
          } else {
            Write-Error "Could not find transcrptr.exe"
          }

      - name: Upload Portable Executable to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: transcrptr-v${{ env.APP_VERSION }}
          files: Transcrptr-portable.exe
