name: Release Windows Build
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Long Paths
        run: |
          git config --system core.longpaths true
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -Force

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc


      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - name: Install Ninja
        run: choco install ninja

      - name: Install frontend dependencies
        run: npm install

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CMAKE_GENERATOR: Ninja
          CARGO_TARGET_DIR: D:\t
          RUSTFLAGS: -C target-feature=+crt-static
          CFLAGS: /MT
          CXXFLAGS: /MT
          CMAKE_POLICY_DEFAULT_CMP0091: NEW
          CMAKE_MSVC_RUNTIME_LIBRARY: MultiThreaded
        with:
          tagName: transcrptr-v__VERSION__
          releaseName: 'Transcrptr v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          includeRelease: true

      - name: Extract Project Version
        run: |
          $VERSION = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          echo "APP_VERSION=$VERSION" >> $env:GITHUB_ENV

      - name: Copy Portable Executable
        env:
          CARGO_TARGET_DIR: D:\t
        run: |
          $targetPath = if ($env:CARGO_TARGET_DIR) { $env:CARGO_TARGET_DIR } else { "src-tauri/target" }
          $exePaths = @(
            "$targetPath/release/tauri-app.exe",
            "$targetPath/release/Transcrptr.exe",
            "$targetPath/x86_64-pc-windows-msvc/release/tauri-app.exe",
            "$targetPath/x86_64-pc-windows-msvc/release/Transcrptr.exe"
          )
          
          $found = $false
          foreach ($p in $exePaths) {
            if (Test-Path $p) {
              Copy-Item -Path $p -Destination "Transcrptr-portable.exe"
              $found = $true
              break
            }
          }
          
          if (-not $found) {
            Get-ChildItem -Path src-tauri/target -Filter "*.exe" -Recurse | Select-Object FullName
            Write-Error "Could not find the executable."
          }

      - name: Copy NSIS Installer
        env:
          CARGO_TARGET_DIR: D:\t
        run: |
          $targetPath = if ($env:CARGO_TARGET_DIR) { $env:CARGO_TARGET_DIR } else { "src-tauri/target" }
          $nsisPattern = "*-setup*.exe"
          $searchPaths = @(
            "$targetPath/release/bundle/nsis",
            "$targetPath/x86_64-pc-windows-msvc/release/bundle/nsis"
          )
          
          $found = $false
          foreach ($dir in $searchPaths) {
            if (Test-Path $dir) {
              $installer = Get-ChildItem -Path $dir -Filter $nsisPattern | Select-Object -First 1
              if ($installer) {
                Copy-Item -Path $installer.FullName -Destination "Transcrptr_x64-setup.exe"
                Write-Host "Found NSIS installer: $($installer.FullName)"
                $found = $true
                break
              }
            }
          }
          
          if (-not $found) {
            Write-Warning "NSIS installer not found, only portable exe will be uploaded."
          }

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: transcrptr-v${{ env.APP_VERSION }}
          files: |
            Transcrptr-portable.exe
            Transcrptr_x64-setup.exe
          make_latest: true
