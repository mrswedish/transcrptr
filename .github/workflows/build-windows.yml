name: Release Windows Build
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm install

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: transcrptr-v__VERSION__
          releaseName: 'Transcrptr v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          includeRelease: true

      - name: Extract Project Version
        run: |
          $VERSION = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          echo "APP_VERSION=$VERSION" >> $env:GITHUB_ENV

      - name: Copy Portable Executable
        run: |
          $exePaths = @(
            "src-tauri/target/release/tauri-app.exe",
            "src-tauri/target/release/Transcrptr.exe",
            "src-tauri/target/x86_64-pc-windows-msvc/release/tauri-app.exe",
            "src-tauri/target/x86_64-pc-windows-msvc/release/Transcrptr.exe"
          )
          
          $found = $false
          foreach ($p in $exePaths) {
            if (Test-Path $p) {
              Copy-Item -Path $p -Destination "Transcrptr-portable.exe"
              $found = $true
              break
            }
          }
          
          if (-not $found) {
            Get-ChildItem -Path src-tauri/target -Filter "*.exe" -Recurse | Select-Object FullName
            Write-Error "Could not find the executable."
          }

      - name: Upload Portable Executable to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: transcrptr-v${{ env.APP_VERSION }}
          files: Transcrptr-portable.exe
